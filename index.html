<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root{
  --fmf-blue:#1e3a8a;
  --fmf-light:#eaf2ff;
  --fmf-border:#dbeafe;
  --path-red:#dc2626;
  --path-yellow:#ca8a04;
  --path-orange:#ea580c;
  --text-soft:#6b7280;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#ffffff;
  padding:24px;
  max-width:520px;
  margin:auto;
  color:#1f2937;
  min-height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
}

h1{
  font-size:20px;
  font-weight:600;
  margin-bottom:28px;
  color:var(--fmf-blue);
}

.section{margin-bottom:26px;}

label{
  font-size:12px;
  text-transform:uppercase;
  color:var(--text-soft);
  display:block;
  margin-bottom:6px;
  letter-spacing:0.5px;
}

.row{
  display:flex;
  align-items:center;
  gap:16px;
}

.row input{
  flex:1;
  border:none;
  border-bottom:1px solid var(--fmf-border);
  padding:8px 4px;
  font-size:16px;
  background:white;
  outline:none;
  transition:0.2s;
}

.row input:focus{
  border-bottom:2px solid var(--fmf-blue);
}

.row input.active-field{
  border-bottom:2px solid var(--fmf-blue);
}

.result{
  min-width:150px;
  text-align:right;
  font-size:14px;
  font-weight:500;
  color:var(--text-soft);
  position:relative;
}

.result.red{ color:var(--path-red); }
.result.yellow{ color:var(--path-yellow); }
.result.orange{ color:var(--path-orange); }

.divider{
  height:1px;
  background:var(--fmf-border);
  margin:28px 0;
}

.zscore{
  font-size:12px;
  margin-top:3px;
  opacity:0.8;
}

/* ===== Keyboard ===== */

.keyboard{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#f3f4f6;
  padding:10px 12px 16px;
  box-shadow:0 -6px 20px rgba(0,0,0,0.15);
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  z-index:9999;
}

.hidden{ display:none; }

.kb-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:10px;
}

.kb-grid button,
.kb-actions button{
  font-size:18px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:white;
}

.kb-actions{
  margin-top:8px;
}

.kb-actions button{
  width:100%;
  height:48px;
  border:none;
  border-radius:12px;
  background:#dbeafe;
  color:#1e3a8a;
  font-size:17px;
  font-weight:600;
  letter-spacing:0.2px;
  box-shadow:none;
}

.kb-actions button:active{
  transform:scale(0.98);
}

.kb-grid button{
  touch-action:manipulation;
}

html,body{
  touch-action:pan-y;
}

html{
  overflow-x:hidden;
  overflow-y:auto;
}

#bottomSpacer{
  height:0;
}
</style>
</head>

<body>

<h1>Prenatal Biometry</h1>

<div class="section">
<label>Gestational Age</label>
<div class="row">
<input id="weeks" type="text" placeholder="Weeks (14–41)" min="14" max="41" readonly>
<input id="days" type="text" placeholder="Days" min="0" max="6" readonly>
</div>
</div>

<div class="divider"></div>

<div class="section">
<label>BPD (mm)</label>
<div class="row">
<input id="bpd" type="text" readonly>
<div id="bpd_res" class="result"></div>
</div>
</div>

<div class="section">
<label>HC (mm)</label>
<div class="row">
<input id="hc" type="text" readonly>
<div id="hc_res" class="result"></div>
</div>
</div>

<div class="section">
<label>AC (mm)</label>
<div class="row">
<input id="ac" type="text" readonly>
<div id="ac_res" class="result"></div>
</div>
</div>

<div class="section">
<label>FL (mm)</label>
<div class="row">
<input id="fl" type="text" readonly>
<div id="fl_res" class="result"></div>
</div>
</div>

<div class="divider"></div>

<div class="section">
<label>EFW (Hadlock-3)</label>
<div class="row">
<input id="efw" readonly>
<div id="efw_res" class="result"></div>
</div>
</div>

<div class="section">
<label>Or enter EFW manually</label>
<div class="row">
<input id="efw_manual" type="text" readonly>
<div id="efw_manual_res" class="result"></div>
</div>
</div>

<div id="customKeyboard" class="keyboard hidden">
  <div class="kb-grid">
    <button data-key="1">1</button>
    <button data-key="2">2</button>
    <button data-key="3">3</button>
    <button data-key="4">4</button>
    <button data-key="5">5</button>
    <button data-key="6">6</button>
    <button data-key="7">7</button>
    <button data-key="8">8</button>
    <button data-key="9">9</button>
    <button data-key=".">.</button>
    <button data-key="0">0</button>
    <button data-key="back">⌫</button>
  </div>
  <div class="kb-actions">
    <button id="kbNext">Next</button>
  </div>
</div>

<div id="bottomSpacer"></div>

<script>
function haptic(type="light"){
  if(window.Telegram?.WebApp?.HapticFeedback){
    if(type==="light") Telegram.WebApp.HapticFeedback.impactOccurred("light");
    if(type==="medium") Telegram.WebApp.HapticFeedback.impactOccurred("medium");
    if(type==="heavy") Telegram.WebApp.HapticFeedback.impactOccurred("heavy");
    return;
  }

  if(navigator.vibrate){
    if(type==="light") navigator.vibrate(10);
    if(type==="medium") navigator.vibrate(20);
    if(type==="heavy") navigator.vibrate(30);
  }
}

/* ===============================
   CORE MATH
================================ */

function gaInWeeks(w,d){ return w + d/7; }

function erf(x){
  const sign=x>=0?1:-1;
  x=Math.abs(x);
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741;
  const a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const t=1/(1+p*x);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign*y;
}

function normalCDF(z){ return 0.5*(1+erf(z/Math.SQRT2)); }
function percentile(z){ return +(normalCDF(z)*100).toFixed(2); }

/* ===============================
   BIOMETRY
================================ */

function meanHC(g){ return -28.2849+1.69267*g**2-0.397485*g**2*Math.log(g); }
function sdHC(g){ return 1.98735+0.0136772*g**3-0.00726264*g**3*Math.log(g)+0.000976253*g**3*Math.log(g)**2; }

function meanBPD(g){ return 5.60878+0.158369*g**2-0.00256379*g**3; }
function sdBPD(g){ return Math.exp(0.101242+0.00150557*g**3-0.000771535*g**3*Math.log(g)+0.0000999638*g**3*Math.log(g)**2); }

function meanAC(g){ return -81.3243+11.6772*g-0.000561865*g**3; }
function sdAC(g){ return -4.36302+0.121445*g**2-0.0130256*g**3+0.00282143*g**3*Math.log(g); }

function meanFL(g){ return -39.9616+4.32298*g-0.0380156*g**2; }
function sdFL(g){ return Math.exp(0.605843-42.0014*g**(-2)+0.00000917972*g**3); }

/* ===============================
   HADLOCK-3
================================ */

function calculateEFW_Hadlock3(HC, AC, FL){
  if(!HC || !AC || !FL) return null;

  const HCcm = HC/10;
  const ACcm = AC/10;
  const FLcm = FL/10;

  const log10EFW =
      1.326
    - 0.00326 * ACcm * FLcm
    + 0.0107 * HCcm
    + 0.0438 * ACcm
    + 0.158  * FLcm;

  return +Math.pow(10,log10EFW).toFixed(0);
}

/* ===============================
   INTERGROWTH LMS
================================ */

function lambdaEFW(g){
  const x=g/10;
  return 9.43643+9.41579*x**(-2)-83.54220*Math.log(x)*x**(-2);
}

function muEFW(g){
  return -2.42272+1.86478*Math.sqrt(g)-1.93299e-5*g**3;
}

function sigmaEFW(g){
  const x=g/10;
  return 0.0193557+0.0310716*x**(-2)-0.0657587*Math.log(x)*x**(-2);
}

function zEFW(efw,g){
  if(!isFinite(efw) || efw<=0) return NaN;

  const L=lambdaEFW(g);
  const M=muEFW(g);
  const S=sigmaEFW(g);
  const Y=Math.log(efw);

  if(Math.abs(L)<1e-6) return (Y-M)/S;

  return (Math.pow(Y/M,L)-1)/(L*S);
}

/* ===============================
   UI
================================ */

function validateWeeks(){
  let v = parseInt(weeks.value);
  if(isNaN(v)) return;

  if(v < 14) weeks.value = 14;
  else if(v > 41) weeks.value = 41;

  weeks.dispatchEvent(new Event("input"));
}

function validateDays(){
  let v = parseInt(days.value);
  if(isNaN(v)) return;

  if(v < 0) days.value = 0;
  else if(v > 6) days.value = 6;

  days.dispatchEvent(new Event("input"));
}

function paint(box,p,z){
  box.className="result";

  if(p<3) box.classList.add("red");
  else if(p<10) box.classList.add("yellow");
  else if(p>90) box.classList.add("orange");

  const zText = isFinite(z) ? z.toFixed(2) : "—";

  box.innerHTML = `
    <div>${p} percentile</div>
    <div class="zscore">z = ${zText}</div>
  `;
}

function analyze(){
  const w=parseInt(weeks.value);
  const d=parseInt(days.value)||0;

  let g=null;

  if(!isNaN(w)){
    g=gaInWeeks(w,d);
  }

  function compute(val,meanFn,sdFn,res){
    if(!val || !g){
      res.innerText="";
      return;
    }

    const z=(val-meanFn(g))/sdFn(g);
    paint(res,percentile(z),z);
  }

  compute(parseFloat(bpd.value),meanBPD,sdBPD,bpd_res);
  compute(parseFloat(hc.value),meanHC,sdHC,hc_res);
  compute(parseFloat(ac.value),meanAC,sdAC,ac_res);
  compute(parseFloat(fl.value),meanFL,sdFL,fl_res);

  const HC = parseFloat(hc.value);
  const AC = parseFloat(ac.value);
  const FL = parseFloat(fl.value);

  if(HC && AC && FL){
    const efwValue = calculateEFW_Hadlock3(HC, AC, FL);
    efw.value = efwValue;

    if(g){
      const z = zEFW(efwValue,g);
      paint(efw_res,percentile(z),z);
    }
  }else{
    efw.value = "";
    efw_res.innerText = "";
  }

  const manual=parseFloat(efw_manual.value);

  if(manual>0 && g){
    const z=zEFW(manual,g);
    paint(efw_manual_res,percentile(z),z);
  }else{
    efw_manual_res.innerText="";
  }
}

document.querySelectorAll("input")
.forEach(i=>i.addEventListener("input",analyze));

/* ===============================
   KEYBOARD
================================ */

const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

let activeInput=null;
let replaceOnInput=false;

const keyboard=document.getElementById("customKeyboard");
const spacer=document.getElementById("bottomSpacer");
const keys=document.querySelectorAll("[data-key]");
const nextBtn=document.getElementById("kbNext");
const inputs=[weeks,days,bpd,hc,ac,fl,efw_manual];

const inputLimits = {
  weeks: {int:2, dec:0},
  days: {int:1, dec:0},
  bpd: {int:3, dec:1},
  hc: {int:3, dec:1},
  ac: {int:3, dec:1},
  fl: {int:2, dec:1},
  efw_manual: {int:4, dec:0}
};

if(!isMobile){
  inputs.forEach(i=>i.removeAttribute("readonly"));
}

function getKeyboardHeight(){
  if(keyboard.classList.contains("hidden")) return 0;
  return keyboard.offsetHeight || 0;
}

function updateKeyboardSpace(){
  if(!isMobile) return;

  if(keyboard.classList.contains("hidden")){
    spacer.style.height = "0px";
    return;
  }

  const h = getKeyboardHeight();
  spacer.style.height = (h + 12) + "px";
}

function ensureVisible(input){
  if(!isMobile || !input) return;

  requestAnimationFrame(()=>{
    const rect = input.getBoundingClientRect();
    const keyboardTop = window.innerHeight - getKeyboardHeight();
    const safeBottom = keyboardTop - 12;
    const safeTop = 12;

    if(rect.bottom > safeBottom){
      window.scrollBy({
        top: rect.bottom - safeBottom,
        behavior: "smooth"
      });
    }else if(rect.top < safeTop){
      window.scrollBy({
        top: rect.top - safeTop,
        behavior: "smooth"
      });
    }
  });
}

function setActiveField(input){
  inputs.forEach(i => i.classList.remove("active-field"));
  if(input) input.classList.add("active-field");
}

function openKeyboard(input){

  activeInput = input;
  replaceOnInput = activeInput.value.length > 0;
  setActiveField(input);

  if(!isMobile){
    input.focus();
    return;
  }

  keyboard.classList.remove("hidden");
  nextBtn.innerText = (input===efw_manual) ? "Done" : "Next";

  updateKeyboardSpace();

  setTimeout(()=>{
    updateKeyboardSpace();
    ensureVisible(input);
  }, 50);

  setTimeout(()=>{
    ensureVisible(input);
  }, 180);
}

function closeKeyboard(){
  if(activeInput === weeks) validateWeeks();
  if(activeInput === days) validateDays();

  keyboard.classList.add("hidden");
  spacer.style.height = "0px";
  activeInput = null;
  replaceOnInput = false;
  setActiveField(null);
}

inputs.forEach(input=>{
  input.addEventListener("pointerdown",(e)=>{
    if(isMobile){
      e.preventDefault();
      openKeyboard(input);
    }
  });
});

weeks.addEventListener("blur",validateWeeks);
days.addEventListener("blur",validateDays);

keys.forEach(btn=>{
  btn.addEventListener("pointerdown",(e)=>{
    e.preventDefault();

    if(!activeInput) return;

    const key=btn.dataset.key;
    haptic("light");

    if(key==="back"){
      activeInput.value=activeInput.value.slice(0,-1);
      replaceOnInput=false;
    }else{
      if(key === "."){
        if(activeInput === weeks || activeInput === days) return;
        if(activeInput.value.includes(".")) return;
      }

      if(replaceOnInput){
        activeInput.value="";
        replaceOnInput=false;
      }
      if(activeInput.id !== "days" && activeInput.value === "" && key === "0"){
        return;
      }
      const limits = inputLimits[activeInput.id];

      if(limits){
        let value = activeInput.value;

        if(value.includes(".")){
          let [intPart, decPart] = value.split(".");
          if(key !== "." && decPart.length >= limits.dec) return;
        }else{
          if(key !== "." && value.length >= limits.int) return;
        }
      }

      activeInput.value += key;
    }

    activeInput.dispatchEvent(new Event("input"));
    ensureVisible(activeInput);

    setTimeout(()=>{
      ensureVisible(activeInput);
    }, 80);
  });
});

nextBtn.addEventListener("pointerdown",(e)=>{
  e.preventDefault();

  if(!activeInput) return;

  haptic("medium");

  if(activeInput === weeks) validateWeeks();
  if(activeInput === days) validateDays();

  const index=inputs.indexOf(activeInput);

  if(index<inputs.length-1){
    const nextInput = inputs[index+1];

    activeInput = nextInput;
    replaceOnInput = nextInput.value.length > 0;
    setActiveField(nextInput);

    if(!isMobile){
      nextInput.focus();
    }

    nextBtn.innerText = (nextInput===efw_manual) ? "Done" : "Next";

    updateKeyboardSpace();

    setTimeout(()=>{
      updateKeyboardSpace();
      ensureVisible(nextInput);
    }, 50);

    setTimeout(()=>{
      ensureVisible(nextInput);
    }, 180);

  }else{
    closeKeyboard();
  }

});

document.addEventListener("pointerdown",(e)=>{
  if(!isMobile) return;

  const clickedInput=inputs.includes(e.target);
  const clickedKeyboard=keyboard.contains(e.target);

  if(!clickedInput && !clickedKeyboard){
    closeKeyboard();
  }
});
</script>
</body>
</html>
